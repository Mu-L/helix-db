name: SDK DSL Parity

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'sdks/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/parity_tests.yml'
  push:
    branches: [main, dev]
    paths:
      - 'sdks/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/parity_tests.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  parity:
    runs-on: ubuntu-latest          # Docker daemon preinstalled; required for the runtime phase
    timeout-minutes: 30
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4

      # --- Rust (generate Rust fixtures) ---
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') || 'fallback' }}
          restore-keys: ${{ runner.os }}-cargo-

      # --- Node (all phases) ---
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json

      # --- helix CLI (released binary) ---
      - name: Install helix CLI
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ github.token }}   # avoids unauthenticated GitHub API rate limits in install.sh
        run: |
          curl -fsSL https://raw.githubusercontent.com/HelixDB/helix-db/main/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: |
          helix --version
          docker --version

      - name: Install npm deps
        run: npm ci

      - name: Run parity suite
        run: npm run test:parity

      - name: Upload parity artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: parity-output
          path: |
            sdks/tests/parity/generated/**
            sdks/tests/parity/results/**
          if-no-files-found: ignore
